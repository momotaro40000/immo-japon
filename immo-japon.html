<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家探し — Immo Japon</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #1a1a1a;
    --stone:  #8a8680;
    --mist:   #f5f3ef;
    --border: #e2dfd9;
    --white:  #ffffff;
    --red:    #c0392b;
    --green:  #2ecc71;
    --orange: #f39c12;
  }

  html, body {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--mist);
    color: var(--ink);
  }

  /* ── HEADER ── */
  .header {
    flex-shrink: 0;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    z-index: 1000;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-kanji {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 0.05em;
  }
  .logo-sep {
    width: 1px;
    height: 16px;
    background: var(--border);
  }
  .logo-latin {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
  }

  .count {
    font-size: 12px;
    color: var(--stone);
  }
  .count b { color: var(--red); font-weight: 500; }

  /* ── FILTRES ── */
  .filters {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex: 1;
  }

  .field label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--stone);
  }

  .field input {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    background: var(--mist);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus {
    border-color: var(--red);
    background: var(--white);
  }
  .field input::placeholder { color: #bbb; }

  .btn-search {
    flex-shrink: 0;
    padding: 7px 16px;
    background: var(--ink);
    color: var(--white);
    border: none;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-search:hover { background: var(--red); }
  .btn-search:active { transform: scale(0.98); }

  /* ── LÉGENDE ── */
  .legend {
    display: flex;
    gap: 14px;
    margin-top: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--stone);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── CARTE ── */
  #map { flex: 1; z-index: 1; }

  /* ── POPUP ── */
  .leaflet-popup-content-wrapper {
    border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    padding: 0;
    overflow: hidden;
    border: none;
  }
  .leaflet-popup-content { margin: 0; width: 220px !important; }
  .leaflet-popup-tip-container { display: none; }

  .popup-img {
    width: 100%; height: 140px;
    object-fit: cover; display: block;
  }
  .popup-placeholder {
    width: 100%; height: 140px;
    background: var(--mist);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  .popup-body { padding: 12px 14px; }
  .popup-price {
    font-size: 22px; font-weight: 400;
    letter-spacing: -0.02em; margin-bottom: 2px;
  }
  .popup-yen {
    font-size: 10px; color: var(--stone);
    font-family: 'Noto Sans JP', sans-serif;
    margin-bottom: 8px;
  }
  .popup-surfaces {
    font-size: 11px; color: var(--stone);
    margin-bottom: 10px;
  }
  .popup-btn {
    display: block; text-align: center;
    padding: 9px; background: var(--ink);
    color: var(--white); text-decoration: none;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    border-radius: 4px;
  }
  .popup-btn:hover { background: var(--red); }

  /* Loading */
  #map-loading {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 13px; color: var(--stone);
    z-index: 999; pointer-events: none;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <span class="logo-kanji">家探し</span>
      <div class="logo-sep"></div>
      <span class="logo-latin">Immo Japon</span>
    </div>
    <div class="count"><b id="count">—</b> annonces</div>
  </div>

  <div class="filters">
    <div class="field">
      <label>Budget max $</label>
      <input type="number" id="f-budget" placeholder="50000" value="50000" min="0" max="100000" step="1000">
    </div>
    <div class="field">
      <label>Maison min m²</label>
      <input type="number" id="f-maison" placeholder="ex: 80" min="0" max="500" step="5">
    </div>
    <div class="field">
      <label>Terrain min m²</label>
      <input type="number" id="f-terrain" placeholder="ex: 200" min="0" max="10000" step="50">
    </div>
    <button class="btn-search" onclick="doSearch()">Chercher</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>0–10k$</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>10–20k$</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>20–50k$</div>
  </div>
</div>

<div id="map" style="position:relative">
  <div id="map-loading">Chargement…</div>
</div>

<script>
// ── SUPABASE CONFIG ───────────────────────────────────────────────
const SB_URL = "https://obhpugsucgtwbmqrfdzr.supabase.co";
const SB_KEY = "sb_publishable_Dkbl8hh9OyOlmOqIEVAzbg_yfvvqpaj";

async function supabaseQuery(filters) {
  let url = `${SB_URL}/rest/v1/listings?select=price_man,price_usd,maison_m2,terrain_m2,lat,lng,url,img_url`;
  url += `&lat=not.is.null&lng=not.is.null`;
  url += `&price_usd=lte.${filters.budget}`;
  if (filters.maison > 0)  url += `&maison_m2=gte.${filters.maison}`;
  if (filters.terrain > 0) url += `&terrain_m2=gte.${filters.terrain}`;
  url += `&limit=1000`;

  const r = await fetch(url, {
    headers: {
      "apikey": SB_KEY,
      "Authorization": `Bearer ${SB_KEY}`,
    }
  });
  return r.json();
}

// ── CARTE ────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([34.9, 133.9], 8);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB',
  subdomains: 'abcd', maxZoom: 18
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);

function priceColor(usd) {
  if (usd <= 10000) return "#2ecc71";
  if (usd <= 20000) return "#f39c12";
  return "#c0392b";
}

function makeIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
    <circle cx="13" cy="13" r="9" fill="${color}" stroke="white" stroke-width="2.5" opacity="0.92"/>
    <line x1="13" y1="22" x2="13" y2="32" stroke="${color}" stroke-width="2" opacity="0.4"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [26,34], iconAnchor: [13,32], popupAnchor: [0,-30] });
}

// Jitter : disperse les points trop proches
function jitter(items) {
  const THR = 0.004;
  const MAX = 0.013;
  const placed = [];
  return items.map(l => {
    let lat = l.lat, lng = l.lng;
    for (let i = 0; i < 30; i++) {
      const clash = placed.some(p => Math.abs(p.lat-lat) < THR && Math.abs(p.lng-lng) < THR);
      if (!clash) break;
      const a = Math.random() * 2 * Math.PI;
      const d = (0.3 + Math.random() * 0.7) * MAX;
      lat = l.lat + Math.cos(a) * d;
      lng = l.lng + Math.sin(a) * d;
    }
    placed.push({ lat, lng });
    return { ...l, lat, lng };
  });
}

function buildPopup(l) {
  const usd = l.price_usd.toLocaleString('en-US', { style:'currency', currency:'USD', maximumFractionDigits:0 });
  const yen = (l.price_man * 10000).toLocaleString();
  const img = l.img_url
    ? `<img class="popup-img" src="${l.img_url}" alt="" onerror="this.parentElement.innerHTML='<div class=popup-placeholder>🏠</div>'">`
    : `<div class="popup-placeholder">🏠</div>`;
  const surfaces = [];
  if (l.maison_m2)  surfaces.push(`🏠 ${l.maison_m2}m²`);
  if (l.terrain_m2) surfaces.push(`🌿 ${l.terrain_m2}m²`);
  const surf = surfaces.length ? `<div class="popup-surfaces">${surfaces.join(' · ')}</div>` : '';
  return `${img}
    <div class="popup-body">
      <div class="popup-price">${usd}</div>
      <div class="popup-yen">${l.price_man}万円 = ${yen}¥</div>
      ${surf}
      <a class="popup-btn" href="${l.url}" target="_blank">Voir l'annonce →</a>
    </div>`;
}

async function doSearch() {
  const budget  = parseInt(document.getElementById('f-budget').value)  || 50000;
  const maison  = parseInt(document.getElementById('f-maison').value)  || 0;
  const terrain = parseInt(document.getElementById('f-terrain').value) || 0;

  document.getElementById('count').textContent = '…';
  document.getElementById('map-loading').style.display = 'block';
  markerLayer.clearLayers();

  try {
    const data = await supabaseQuery({ budget, maison, terrain });
    document.getElementById('map-loading').style.display = 'none';

    const dispersed = jitter(data);
    dispersed.forEach(l => {
      const marker = L.marker([l.lat, l.lng], { icon: makeIcon(priceColor(l.price_usd)) });
      marker.bindPopup(buildPopup(l), { maxWidth: 220, minWidth: 220 });
      markerLayer.addLayer(marker);
    });

    document.getElementById('count').textContent = data.length;

    if (data.length > 0) {
      const group = L.featureGroup(markerLayer.getLayers());
      map.fitBounds(group.getBounds().pad(0.1));
    }
  } catch(e) {
    document.getElementById('map-loading').textContent = 'Erreur de chargement';
    console.error(e);
  }
}

// Lancement initial
doSearch();
</script>
</body>
</html>
